<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portfolio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: #f0eeea;
      font-family: 'Barlow', -apple-system, 'Helvetica Neue', sans-serif;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    nav {
      display: flex;
      justify-content: flex-end;
      align-items: center;
      padding: 14px 20px;
      gap: 6px;
      position: fixed;
      top: 0;
      right: 0;
      z-index: 100;
    }

    .nav-pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 14px 6px 10px;
      background: transparent;
      border: none;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 500;
      color: #3a3a3a;
      cursor: pointer;
      text-decoration: none;
      letter-spacing: -0.01em;
      transition: background 0.15s ease, color 0.15s ease;
    }

    .nav-pill:hover {
      background: #d6d4d0;
      color: #1a1a1a;
    }

    .nav-pill svg {
      width: 14px;
      height: 14px;
      flex-shrink: 0;
      opacity: 0.75;
    }

    .nav-pill:hover svg {
      opacity: 1;
    }

    /* Hero */
    .hero {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      padding: 0 24px;
    }

    .hero-name {
      font-family: 'Barlow', sans-serif;
      font-size: clamp(28px, 4vw, 48px);
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #2a2a2a;
      margin-bottom: 10px;
    }

    .hero-title {
      font-family: 'Barlow', sans-serif;
      font-size: clamp(11px, 1.2vw, 14px);
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: #72b85f;
      margin-bottom: 32px;
    }

    .hero-bio {
      font-size: clamp(14px, 1.3vw, 16px);
      font-weight: 400;
      line-height: 1.75;
      color: #888;
      max-width: 420px;
    }

    .hero-chevron {
      position: absolute;
      bottom: 36px;
      left: 50%;
      transform: translateX(-50%);
      color: #bbb;
    }

    .hero-chevron svg {
      width: 20px;
      height: 20px;
    }
  </style>
</head>
<body>
  <nav>
    <a href="#" class="nav-pill">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="3" width="7" height="7" rx="1"/>
        <rect x="14" y="3" width="7" height="7" rx="1"/>
        <rect x="3" y="14" width="7" height="7" rx="1"/>
        <rect x="14" y="14" width="7" height="7" rx="1"/>
      </svg>
      Work
    </a>
    <a href="#" class="nav-pill">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="8" r="4"/>
        <path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
      </svg>
      About
    </a>
    <a href="#" class="nav-pill">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="4" width="18" height="16" rx="2"/>
        <path d="M3 8l9 6 9-6"/>
      </svg>
      Contact
    </a>
  </nav>

  <section class="hero">
    <h1 class="hero-name">Sophia Kambouris</h1>
    <p class="hero-title">Service &amp; Product Designer</p>
    <p class="hero-bio">A short bio or mission statement that describes who you are and the work you do — concise, purposeful, memorable.</p>
    <div class="hero-chevron">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="6 9 12 15 18 9"/>
      </svg>
    </div>
  </section>
</body>
</html>
